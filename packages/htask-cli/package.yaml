_legal: !include "../legal.yaml"

name:                htask-cli
version:             0.2.0.0

<<: *legal

ghc-options: -Wall

dependencies:
  - base >= 4.7 && < 5

library:
  source-dirs: src
  exposed-modules:
    - HTask.CLI.Actions
    - HTask.CLI.App
    - HTask.CLI.Options
    - HTask.CLI.OptionsInfo
    - HTask.CLI.Output.Document
    - HTask.CLI.Output.Formatters
    - HTask.CLI.Render
    - HTask.CLI.Runners
  dependencies:
    - MonadRandom
    - aeson
    - containers
    - event-backend-file
    - htask-core
    - leadpixel-events
    - leadpixel-provider
    - mtl
    - optparse-applicative
    - tagged
    - text
    - time
    - transformers
    - unliftio-core
    - uuid

executables:
  htask:
    main:                Main.hs
    source-dirs:         src
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - htask-cli

tests:
  htask-cli:
    main:                Main.hs
    source-dirs:         test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - MonadRandom
      - base
      - bytestring
      - directory
      - event-backend-file
      - htask-cli
      - htask-core
      - leadpixel-events
      - leadpixel-provider
      - mtl
      - process
      - tasty
      - tasty-golden
      - tasty-hunit
      - text
      - time
      - transformers
      - unliftio-core
      - uuid
