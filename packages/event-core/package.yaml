_legal: !include "../legal.yaml"

name:                leadpixel-events
version:             0.2.0.0

<<: *legal

ghc-options: -Wall

dependencies:
  - base >= 4.7 && < 5

library:
  source-dirs: lib
  exposed-modules: Leadpixel.Events
  dependencies:
    - aeson
    - conduit
    - leadpixel-provider
    - time

tests:
  leadpixel-events:
    main:                Main.hs
    source-dirs:         test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - QuickCheck
      - aeson
      - leadpixel-events
      - quickcheck-instances
      - tasty
      - tasty-quickcheck
      - time
